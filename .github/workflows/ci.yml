name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (clean_mac.sh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint clean_mac.sh
        run: shellcheck --shell=bash clean_mac.sh

  python-tests:
    name: Python unit tests
    # clean_mac.sh uses BSD-only tooling (stat -f, sw_vers), and the tests
    # shell out to it, so they must run on macOS — not ubuntu.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run unittest suite
        run: python -m unittest discover -s tests -p "test_*.py" -v

  js-tests:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run node:test specs
        run: node --test tests/
